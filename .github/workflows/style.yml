name: style
on: [push, pull_request]
jobs:
  clang-format:
    name: C/C++ Style Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: clang-format check
      uses: DoozyX/clang-format-lint-action@v0.20
      with:
        source: '.'
        exclude: ''
        extensions: 'h,hpp,cc,cpp'
        clangFormatVersion: 19
        style: file